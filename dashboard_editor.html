<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库监控 - 华为云监控平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .huawei-brand-blue { color: #2563eb; }
        .bg-huawei-blue { background-color: #2563eb; }
        .huawei-black { background-color: #1a1a1a; }
        
        /* 侧边栏样式 */
        .sidebar-item { @apply w-full h-10 flex items-center justify-center text-gray-500 hover:text-blue-600 hover:bg-white cursor-pointer transition-all duration-200; }
        .sidebar-active { @apply text-blue-600 bg-white border-r-2 border-blue-600; }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        /* 面板阴影与模糊 */
        .config-panel { box-shadow: -8px 0 24px rgba(0, 0, 0, 0.06); }
        
        /* 图表选中态 */
        .chart-type-item {
            @apply border border-gray-200 flex items-center justify-center rounded-md cursor-pointer transition-all duration-150;
            aspect-ratio: 1/1;
        }
        .chart-type-item:hover { @apply border-blue-400 bg-blue-50; }
        .chart-type-item.active { @apply border-blue-600 bg-blue-50 text-blue-600 ring-1 ring-blue-600; }
        .chart-type-item.disabled { @apply opacity-40 cursor-not-allowed bg-gray-50 border-gray-100; }

        .btn-primary { @apply bg-zinc-800 text-white hover:bg-zinc-700 transition-colors shadow-sm; }
        .btn-secondary { @apply border border-gray-300 text-gray-700 hover:bg-gray-50 transition-colors; }
    </style>
</head>
<body class="bg-[#f3f4f7] h-screen flex flex-col overflow-hidden text-gray-800">

    <header class="huawei-black h-12 flex items-center justify-between px-4 text-gray-300 text-xs shrink-0 z-50">
        <div class="flex items-center space-x-6">
            <div class="p-1 hover:bg-gray-800 rounded cursor-pointer transition-colors">
                <i class="fas fa-bars text-lg"></i>
            </div>
            <div class="flex items-center space-x-2">
                <div class="w-6 h-6 bg-red-600 rounded-sm flex items-center justify-center font-bold text-[10px] text-white">H</div>
                <span class="text-white font-bold tracking-tight text-sm">HUAWEI</span>
            </div>
            <nav class="hidden lg:flex space-x-6 items-center">
                <a href="#" class="hover:text-white">首页</a>
                <a href="#" class="hover:text-white">告警</a>
                <a href="#" class="text-white font-medium border-b-2 border-red-600 h-12 flex items-center">监控</a>
                <a href="#" class="hover:text-white">资源</a>
                <a href="#" class="hover:text-white">运维</a>
                <a href="#" class="hover:text-white">分析</a>
                <a href="#" class="hover:text-white">报表</a>
                <a href="#" class="hover:text-white">系统</a>
            </nav>
        </div>
        
        <div class="flex items-center space-x-5">
            <div class="relative group">
                <input type="text" placeholder="搜索云服务、快捷操作... (/)" 
                    class="bg-gray-800 rounded px-3 py-1.5 w-64 text-[11px] focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all border border-transparent focus:bg-gray-900">
                <i class="fas fa-search absolute right-3 top-2.5 text-gray-500"></i>
            </div>
            <div class="flex items-center space-x-4">
                <i class="far fa-bell text-sm hover:text-white cursor-pointer relative">
                    <span class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full border border-black"></span>
                </i>
                <i class="far fa-question-circle text-sm hover:text-white cursor-pointer"></i>
                <div class="flex items-center space-x-1 cursor-pointer hover:text-white">
                    <i class="fas fa-globe text-xs"></i>
                    <span>简体</span>
                </div>
                <div class="flex items-center space-x-2 border-l border-gray-700 pl-4 cursor-pointer group">
                    <div class="w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center text-[10px] text-white shadow-sm">AD</div>
                    <span class="group-hover:text-white transition-colors">Admin870</span>
                </div>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <aside class="w-12 bg-[#ebeef3] flex flex-col items-center py-2 space-y-1 text-gray-500 border-r border-gray-200">
            <div class="sidebar-item" title="列表视图"><i class="fas fa-list-ul"></i></div>
            <div class="sidebar-item" title="全球拓扑"><i class="fas fa-globe-asia"></i></div>
            <div class="sidebar-item sidebar-active" title="仪表盘"><i class="fas fa-th-large"></i></div>
            <div class="sidebar-item" title="云资源"><i class="fas fa-cloud"></i></div>
            <div class="sidebar-item" title="主机监控"><i class="fas fa-server"></i></div>
            <div class="sidebar-item" title="报表"><i class="fas fa-table"></i></div>
            <div class="sidebar-item" title="项目文件夹"><i class="fas fa-folder"></i></div>
            <div class="sidebar-item" title="配置中心"><i class="fas fa-tools"></i></div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
            
            <!-- Page Title & Toolbar -->
            <section class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shrink-0 shadow-sm z-10">
                <div class="flex items-center space-x-4">
                    <i class="fas fa-arrow-left text-gray-400 cursor-pointer hover:text-gray-600 transition-colors"></i>
                    <div class="flex items-center space-x-2">
                        <h1 class="text-base font-semibold text-gray-900">数据库监控</h1>
                        <i class="fas fa-pencil-alt text-gray-300 text-[10px] cursor-pointer hover:text-blue-500"></i>
                    </div>
                    <div class="h-4 w-px bg-gray-200 mx-2"></div>
                    <div class="group flex items-center border border-gray-300 rounded-md px-3 py-1 bg-gray-50 text-xs cursor-pointer hover:border-blue-400 transition-all">
                        <span class="text-gray-500 mr-2">区域</span>
                        <span class="text-gray-800 font-medium">华北一区</span>
                        <i class="fas fa-chevron-down ml-3 text-gray-400 group-hover:text-blue-500"></i>
                    </div>
                </div>
                
                <div class="flex items-center space-x-3 text-xs">
                    <div class="flex items-center space-x-1 border border-gray-300 rounded-md px-3 py-1.5 bg-white cursor-pointer hover:border-blue-400 transition-all">
                        <span>最近24H</span>
                        <i class="fas fa-chevron-down text-[9px] text-gray-400"></i>
                    </div>
                    <div class="flex items-center space-x-1 border border-gray-300 rounded-md px-3 py-1.5 bg-white cursor-pointer hover:border-blue-400 transition-all">
                        <i class="fas fa-sync-alt text-gray-400 text-[10px]"></i>
                        <span>1分钟</span>
                        <i class="fas fa-chevron-down text-[9px] text-gray-400"></i>
                    </div>
                    <span class="text-gray-400 text-[11px]">2023/03/14 12:34:51 <i class="fas fa-redo-alt ml-1 cursor-pointer hover:text-blue-500 transition-colors"></i></span>
                    <div class="h-4 w-px bg-gray-200 mx-1"></div>
                    <i class="fas fa-ellipsis-v text-gray-400 cursor-pointer px-2 hover:text-gray-600"></i>
                    <button class="btn-primary px-5 py-1.5 rounded text-xs font-medium">保存</button>
                    <button class="btn-secondary px-5 py-1.5 rounded text-xs font-medium">退出编辑</button>
                </div>
            </section>

            <div class="flex-1 overflow-y-auto p-8 relative">
                <!-- Group Header -->
                <div class="flex items-center space-x-2 mb-6 group cursor-pointer inline-flex">
                    <i class="fas fa-chevron-down text-[9px] text-gray-600 group-hover:text-blue-600"></i>
                    <span class="font-bold text-gray-800 text-sm tracking-tight">分组01</span>
                    <i class="far fa-question-circle text-gray-300 text-xs hover:text-gray-500"></i>
                </div>

                <!-- Empty Chart Card -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-8">
                    <div class="bg-white rounded-lg border-2 border-blue-500 shadow-sm h-80 flex flex-col relative transition-all group overflow-hidden">
                        <div class="p-4 flex justify-between items-center bg-white z-10">
                            <span class="text-sm font-semibold text-gray-800">新图表</span>
                            <div class="flex space-x-3 opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="fas fa-expand text-gray-400 text-xs cursor-pointer hover:text-blue-500"></i>
                                <i class="fas fa-trash text-gray-400 text-xs cursor-pointer hover:text-red-500"></i>
                            </div>
                        </div>
                        <div class="flex-1 flex flex-col items-center justify-center text-center px-12 pb-8">
                            <div class="w-24 h-24 bg-gray-50 rounded-full flex items-center justify-center mb-4 border border-dashed border-gray-200">
                                <div class="relative">
                                    <i class="fas fa-box-open text-gray-200 text-6xl"></i>
                                    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-8 h-1 bg-blue-500 rounded-full"></div>
                                </div>
                            </div>
                            <p class="text-gray-400 text-xs leading-loose font-medium">
                                请在侧边栏中完成图表配置<br>并点击底部按钮更新预览
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="mt-8 flex items-center space-x-8 text-[13px] text-blue-600 font-medium">
                    <button class="flex items-center space-x-1.5 hover:text-blue-700 transition-colors">
                        <i class="fas fa-plus-circle"></i>
                        <span>添加图表</span>
                    </button>
                    <button class="flex items-center space-x-1.5 hover:text-blue-700 transition-colors">
                        <i class="fas fa-plus-circle"></i>
                        <span>添加分组</span>
                    </button>
                </div>

                <div class="mt-16 flex justify-center">
                    <button class="w-12 h-12 rounded-full border border-gray-300 bg-white text-gray-400 flex items-center justify-center hover:border-blue-500 hover:text-blue-500 transition-all hover:shadow-lg transform hover:-translate-y-1">
                        <i class="fas fa-plus text-lg"></i>
                    </button>
                </div>
            </div>

            <aside class="config-panel absolute right-0 top-0 bottom-0 bg-white w-[380px] flex flex-col z-40 border-l border-gray-200 overflow-hidden">
                <!-- Tabs -->
                <div class="flex border-b border-gray-200 shrink-0 h-11">
                    <button class="flex-1 flex items-center justify-center text-sm font-semibold border-b-2 border-blue-600 text-blue-600 bg-blue-50/30">数据</button>
                    <button class="flex-1 flex items-center justify-center text-sm font-medium text-gray-500 hover:text-gray-800 transition-colors">样式</button>
                </div>

                <!-- Config Sections -->
                <div class="flex-1 overflow-y-auto p-6 space-y-8 pb-28">
                    <!-- Dataset Selection -->
                    <section class="space-y-4">
                        <div class="flex items-center space-x-8 text-[13px]">
                            <label class="flex items-center space-x-2 cursor-pointer group">
                                <input type="radio" name="ds-type" checked class="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300">
                                <span class="group-hover:text-gray-900 transition-colors font-medium">按分组</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer group text-gray-500">
                                <input type="radio" name="ds-type" class="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300">
                                <span class="group-hover:text-gray-900 transition-colors">按资源类型</span>
                            </label>
                        </div>
                        <div class="relative group">
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2.5 text-[13px] focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 outline-none bg-white transition-all appearance-none">
                                <option>弹性云服务器性能分析 (多云)</option>
                            </select>
                            <i class="fas fa-chevron-down absolute right-3 top-3.5 text-gray-400 text-[10px] pointer-events-none group-hover:text-blue-500"></i>
                        </div>
                    </section>

                    <!-- Metrics Section -->
                    <section class="space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="text-[13px] font-bold text-gray-800 tracking-tight uppercase tracking-wider">监控指标</span>
                            <i class="fas fa-chevron-up text-[10px] text-gray-400 cursor-pointer hover:text-gray-600"></i>
                        </div>
                        <div class="w-full border border-gray-300 rounded-md p-2 flex flex-wrap gap-2 min-h-[48px] bg-white cursor-pointer hover:border-blue-400 transition-all">
                            <div class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-xs flex items-center font-medium border border-blue-100">
                                <span>CPU使用率最大值</span>
                                <i class="fas fa-times ml-2 text-[10px] hover:text-blue-800 transition-colors"></i>
                            </div>
                            <div class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-xs flex items-center font-medium border border-blue-100">
                                <span>CPU使用率平均值</span>
                                <i class="fas fa-times ml-2 text-[10px] hover:text-blue-800 transition-colors"></i>
                            </div>
                            <div class="flex-1 flex justify-end items-center px-1">
                                <i class="fas fa-chevron-down text-[10px] text-gray-400"></i>
                            </div>
                        </div>
                    </section>

                    <!-- Chart Type Matrix -->
                    <section class="space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="text-[13px] font-bold text-gray-800 tracking-tight uppercase tracking-wider">图表类型</span>
                        </div>
                        <div class="grid grid-cols-5 gap-3">
                            <div class="chart-type-item active" title="折线图"><i class="fas fa-chart-line text-lg"></i></div>
                            <div class="chart-type-item" title="面积图"><i class="fas fa-chart-area text-lg text-gray-500"></i></div>
                            <div class="chart-type-item" title="柱状图"><i class="fas fa-chart-bar text-lg text-gray-500"></i></div>
                            <div class="chart-type-item" title="条形图"><i class="fas fa-chart-bar rotate-90 text-lg text-gray-500"></i></div>
                            <div class="chart-type-item disabled" title="环形图(不可用)"><i class="fas fa-ban text-gray-300"></i></div>
                            <div class="chart-type-item" title="表格"><i class="fas fa-table text-lg text-gray-500"></i></div>
                            <div class="chart-type-item" title="仪表盘"><i class="fas fa-tachometer-alt text-lg text-gray-500"></i></div>
                            <div class="chart-type-item" title="数值图"><i class="fas fa-hashtag text-lg text-gray-500 font-bold"></i></div>
                            <div class="chart-type-item" title="蜂巢图"><i class="fas fa-braille text-lg text-gray-500"></i></div>
                            <div class="chart-type-item" title="更多类型"><i class="fas fa-ellipsis-h text-lg text-gray-500"></i></div>
                        </div>
                    </section>

                    <!-- Dimensions -->
                    <section class="space-y-5">
                        <div class="flex items-center justify-between border-b border-gray-100 pb-2">
                            <span class="text-[13px] font-bold text-gray-800 tracking-tight uppercase tracking-wider">维度与筛选</span>
                            <i class="fas fa-chevron-up text-[10px] text-gray-400"></i>
                        </div>
                        <div class="space-y-4">
                            <div class="space-y-1.5">
                                <div class="flex items-center text-[11px] text-gray-500 font-medium uppercase tracking-wide">
                                    <span>X轴 (时间间隔)</span>
                                    <i class="far fa-question-circle ml-1.5 text-[10px]"></i>
                                </div>
                                <div class="relative">
                                    <select class="w-full border border-gray-300 rounded-md px-3 py-2 text-[13px] bg-white outline-none hover:border-gray-400 transition-colors appearance-none">
                                        <option>自动间隔时间</option>
                                        <option>5分钟</option>
                                        <option>1小时</option>
                                    </select>
                                    <i class="fas fa-chevron-down absolute right-3 top-3 text-gray-400 text-[10px] pointer-events-none"></i>
                                </div>
                            </div>
                            <div class="space-y-1.5">
                                <div class="flex items-center text-[11px] text-gray-500 font-medium uppercase tracking-wide">
                                    <span>图例 (分组维度)</span>
                                    <i class="far fa-question-circle ml-1.5 text-[10px]"></i>
                                </div>
                                <div class="relative">
                                    <select class="w-full border border-gray-300 rounded-md px-3 py-2 text-[13px] bg-white outline-none hover:border-gray-400 transition-colors appearance-none">
                                        <option>区域</option>
                                        <option>资源 ID</option>
                                    </select>
                                    <i class="fas fa-chevron-down absolute right-3 top-3 text-gray-400 text-[10px] pointer-events-none"></i>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- Bottom Sticky Footer -->
                <div class="absolute bottom-0 left-0 right-0 p-5 border-t border-gray-200 bg-white flex space-x-3 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
                    <button class="flex-1 btn-secondary py-2.5 rounded-md text-[13px] font-semibold">取消</button>
                    <button id="updateBtn" class="flex-1 btn-primary py-2.5 rounded-md text-[13px] font-semibold tracking-wide">更新预览</button>
                </div>
            </aside>

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const updateBtn = document.getElementById('updateBtn');
            const placeholderText = document.querySelector('.chart-card p');
            const placeholderIcon = document.querySelector('.chart-card i');

            updateBtn.addEventListener('click', () => {
                // Mocking update behavior
                updateBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>处理中...';
                updateBtn.disabled = true;

                setTimeout(() => {
                    placeholderText.innerHTML = "图表配置已成功应用！<br><span class='text-blue-600 font-bold'>正在实时获取监控指标...</span>";
                    placeholderText.classList.add('animate-pulse');
                    placeholderIcon.classList.remove('text-gray-200');
                    placeholderIcon.classList.add('text-blue-400');
                    
                    updateBtn.innerHTML = '更新预览';
                    updateBtn.disabled = false;
                    
                    // Display success message
                    const msg = document.createElement('div');
                    msg.className = "fixed top-16 left-1/2 -translate-x-1/2 bg-green-500 text-white px-6 py-2 rounded-full text-xs font-bold shadow-xl z-[60] transition-all transform opacity-0";
                    msg.innerText = "配置已更新";
                    document.body.appendChild(msg);
                    setTimeout(() => { msg.classList.add('opacity-100', '-translate-y-2'); }, 100);
                    setTimeout(() => { msg.classList.remove('opacity-100'); setTimeout(() => msg.remove(), 500); }, 2500);
                }, 800);
            });
            
            // Add click event for chart types
            document.querySelectorAll('.chart-type-item:not(.disabled)').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.chart-type-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
